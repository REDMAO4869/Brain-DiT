# Public-safe default: copy and edit paths before running.
# For a complete template, see ../../configs/stage1_raw.example.yaml

seed: 42
device: auto
seq_len: 200
roi_dim: 424
crop_mode: center
pad_mode: zeros
batch_size: 8
num_workers: 4

data:
  atlas: AA424
  dataset_sampling: concat
  subject_col: Subject
  path_col: Path
  path_prefix: null
  strict_seq_len: true
  datasets: [DATASET_NAME]
  splits:
    train:
      DATASET_NAME:
        csv: /path/to/splits/train.csv
    val:
      DATASET_NAME:
        csv: /path/to/splits/val.csv
    test:
      DATASET_NAME:
        csv: /path/to/splits/test.csv

diffusion:
  num_steps: 1000
  schedule: cosine
  pred_type: v

dit:
  patch_size: 4
  d_model: 512
  depth: 8
  num_heads: 8
  mlp_ratio: 4.0
  dropout: 0.0
  d_cond: 256
  pos_embed: sincos
  max_h: 256
  max_w: 256

optim:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  grad_clip_norm: 1.0
  amp: true

epochs: 50
log_every_n_steps: 10
save_every_n_epochs: 1
output_dir: outputs/train

condition:
  enable: true
  label_table: /path/to/labels/metadata.csv
  label_subject_col: Subject
  label_age_col: age
  label_gender_col: Gender
  label_dx_cols: [ADHD_DX, PPMI_DX, ABIDE_DX, ADNI_DX]
  cond_dim: 256
  cond_drop_prob: 0.1
  missing_label_policy: unconditional
  use_null_embedding: true
  tabular_dim: 0
  use_text_cond: false

losses:
  use_xspace_loss: false
  lambda_fc: 1.0
  lambda_fft: 1.0
  lambda_acf: 0.0
